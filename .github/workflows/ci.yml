name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq git shellcheck
    
    - name: Run linter
      run: |
        shellcheck bin/workstation
    
    - name: Test installation
      run: |
        sudo make install
        workstation version
        workstation doctor
    
    - name: Test basic commands
      run: |
        # Test init
        workstation init TestOrg
        cd ~/Workstation/TestOrg-SSOT
        
        # Verify structure
        test -f workstation.json
        test -d templates/seat
        
        echo "✓ All basic tests passed"

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    
    - name: Build distribution
      run: |
        mkdir -p dist
        tar -czf dist/workstation-cli-${{ github.ref_name }}.tar.gz \
          --exclude='.git' \
          --exclude='dist' \
          .
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/workstation-cli-${{ github.ref_name }}.tar.gz
        asset_name: workstation-cli-${{ github.ref_name }}.tar.gz
        asset_content_type: application/gzip
